<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Categories</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="css/admin.css">

</head>

<body>

<div class="admin-wrapper">

<!-- SIDEBAR -->

<div class="sidebar">

<h2>👑 Admin</h2>

<a href="admin-dashboard.html">
Dashboard
</a>

<a href="admin-categories.html">
Categories
</a>

<a href="admin-products.html">
Products
</a>

<a href="admin-orders.html">
Orders
</a>

</div>

<!-- CONTENT -->

<div class="content">

<h1 class="mb-4">
Category Management
</h1>

<!-- ADD CATEGORY -->

<div class="card shadow-sm border-0 mb-4">

<div class="card-body">

<h4 class="mb-3">
Add Category
</h4>

<div class="row">

<div class="col-md-8">

<input
type="text"
id="categoryName"
class="form-control"
placeholder="Category Name"

>

</div>

<div class="col-md-4">

<button
id="addCategoryBtn"
class="btn btn-dark w-100"

>

Add Category </button>

</div>

</div>

</div>

</div>

<!-- CATEGORY TABLE -->

<div class="card shadow-sm border-0">

<div class="card-body">

<h4 class="mb-3">
All Categories
</h4>

<div class="table-responsive">

<table class="table table-bordered">

<thead class="table-dark">

<tr>

<th>ID</th>

<th>Name</th>

<th width="250">
Actions
</th>

</tr>

</thead>

<tbody id="categoryTable">

</tbody>

</table>

</div>

</div>

</div>

<!-- SUB CATEGORY -->

<div class="card shadow-sm border-0 mt-5">

<div class="card-body">

<h4 class="mb-3">
Add SubCategory
</h4>

<div class="row">

<div class="col-md-4">

<select
id="subcategoryCategory"
class="form-control"

>

</select>

</div>

<div class="col-md-5">

<input
type="text"
id="subcategoryName"
class="form-control"
placeholder="SubCategory Name"

>

</div>

<div class="col-md-3">

<button
id="addSubCategoryBtn"
class="btn btn-primary w-100"

>

Add SubCategory </button>

</div>

</div>

</div>

</div>

<!-- SUB CATEGORY TABLE -->

<div class="card shadow-sm border-0 mt-4">

<div class="card-body">

<h4 class="mb-3">
Sub Categories
</h4>

<div class="table-responsive">

<table class="table table-bordered">

<thead class="table-primary">

<tr>

<th>ID</th>

<th>Category ID</th>

<th>Name</th>

<th>
Actions
</th>

</tr>

</thead>

<tbody id="subcategoryTable">

</tbody>

</table>

</div>

</div>

</div>

</div>

</div>

<script src="js/admin-category.js"></script>

</body>

</html>
