<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Products</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f5f5f5;
}

.product-card{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.08);
}

.product-card img{
width:100%;
height:220px;
object-fit:cover;
border-radius:10px;
}

</style>

</head>
<body>

<div class="container py-5">

<h1 class="mb-4">
Products Management
</h1>

<div class="card p-4 mb-4">

<input type="hidden" id="productId">

<input type="number"
id="subcategoryId"
class="form-control mb-2"
placeholder="Subcategory ID">

<input type="text"
id="productName"
class="form-control mb-2"
placeholder="Product Name">

<textarea
id="productDescription"
class="form-control mb-2"
placeholder="Description"></textarea>

<input type="number"
id="productPrice"
class="form-control mb-2"
placeholder="Price">

<input type="number"
id="productStock"
class="form-control mb-2"
placeholder="Stock">

<input type="text"
id="productImage"
class="form-control mb-3"
placeholder="Image Name">

<button
id="saveBtn"
class="btn btn-dark">
Save Product </button>

</div>

<div class="row" id="productsContainer"></div>

</div>

<script src="js/admin-products.js?v=1"></script>

</body>
</html>
