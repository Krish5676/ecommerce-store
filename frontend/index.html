<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Premium Store</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<!-- Navbar Start -->
<nav class="navbar navbar-expand-lg sticky-top">

<div class="container">

<a class="navbar-brand" href="#">
    <i class="fa-solid fa-crown me-2"></i>
    PremiumStore
</a>

<button
class="navbar-toggler"
type="button"
data-bs-toggle="collapse"
data-bs-target="#navbarContent">

<span class="navbar-toggler-icon"></span>

</button>

<div
class="collapse navbar-collapse"
id="navbarContent">

<ul class="navbar-nav mx-auto">

<li class="nav-item">
<a class="nav-link active" href="index.html">
Home
</a>
</li>

<li class="nav-item">
<a class="nav-link" href="products.html">
Products
</a>
</li>

<li class="nav-item">
<a class="nav-link" href="wishlist.html">
Wishlist
</a>
</li>

<li class="nav-item">
<a class="nav-link" href="orders.html">
Orders
</a>
</li>

</ul>

<div class="d-flex gap-3 nav-icons">

<a href="wishlist.html">
<i class="fa-solid fa-heart"></i>
</a>

<a href="cart.html">
<i class="fa-solid fa-cart-shopping"></i>
</a>

<a href="profile.html">
<i class="fa-solid fa-user"></i>
</a>

</div>

</div>

</div>

</nav>
<!-- Navbar End -->


<!-- Hero Section Start -->

<section class="hero">

<div class="container">

<div class="row align-items-center">

<div class="col-lg-6">

<h1 class="hero-title">

Think Different.

</h1>

<p class="hero-subtitle">

Discover premium products
crafted for modern life.

</p>

<a
href="products.html"
class="btn btn-dark btn-lg rounded-pill px-4">

Shop Now

</a>

</div>

<div class="col-lg-6 text-center">

<img
src="images/hero.png"
class="img-fluid hero-image">

</div>

</div>

</div>

</section>

<!-- Hero Section End -->


<!-- Featured Section -->

<section class="hero-slider">

<div class="container">

<div id="homeSlider"
class="carousel slide"
data-bs-ride="carousel">

<div class="carousel-indicators">

<button
type="button"
data-bs-target="#homeSlider"
data-bs-slide-to="0"
class="active">
</button>

<button
type="button"
data-bs-target="#homeSlider"
data-bs-slide-to="1">
</button>

<button
type="button"
data-bs-target="#homeSlider"
data-bs-slide-to="2">
</button>

</div>

<div class="carousel-inner">

<div class="carousel-item active">
<img src="images/banner1.jpg"
class="slider-img">
</div>

<div class="carousel-item">
<img src="images/banner2.jpg"
class="slider-img">
</div>

<div class="carousel-item">
<img src="images/banner3.jpg"
class="slider-img">
</div>

</div>

<button
class="carousel-control-prev"
type="button"
data-bs-target="#homeSlider"
data-bs-slide="prev">

<span class="carousel-control-prev-icon"></span>

</button>

<button
class="carousel-control-next"
type="button"
data-bs-target="#homeSlider"
data-bs-slide="next">

<span class="carousel-control-next-icon"></span>

</button>

</div>

</div>

</section>

<!-- Categories -->

<section class="categories">

<div class="container">

<h2 class="section-title">
Shop By Category
</h2>

<div class="row g-4">

<div class="col-md-3">

<div class="category-card"
onclick="openCategory(1)">

<h4>Men</h4>

</div>

</div>

<div class="col-md-3">

<div class="category-card"
onclick="openCategory(2)">

<h4>Women</h4>


</div>

</div>

<div class="col-md-3">

<div class="category-card"
onclick="openCategory(3)">

<h4>Electronics</h4>

</div>

</div>

<div class="col-md-3">

<div class="category-card"
onclick="openCategory(4)">

<h4>Accessories</h4>


</div>

</div>

</div>

</div>

</section>



<!-- Footer -->

<footer class="footer">

<div class="container text-center">

<h4>PremiumStore</h4>

<p>

Luxury Ecommerce Experience

</p>

</div>

</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/category-navigation.js"></script>
<script src="js/products.js"></script>

</body>
</html>
